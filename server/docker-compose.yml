version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: colweyz_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: colweyz
      POSTGRES_PASSWORD: colweyz_local_2026
      POSTGRES_DB: colweyz
    volumes:
      - colweyz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colweyz -d colweyz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  colweyz_pgdata:
